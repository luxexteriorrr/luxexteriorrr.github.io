<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirill Konstantinov</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/keen-slider@6.8.6/keen-slider.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <span class="header-left">Kirill Konstantinov</span>
        <span class="header-center">Selected Works</span>
        <span class="header-right">2025</span>
    </header>

    <div class="main">
        <!-- Left: names -->
        <div class="col col-names">
            <div class="bar"></div>
            <div id="slider-names" class="keen-slider wheel"></div>
        </div>

        <!-- Middle: titles -->
        <div class="col col-titles">
            <div class="bar"></div>
            <div id="slider-titles" class="keen-slider wheel"></div>
        </div>

        <!-- Right: images -->
        <div class="col col-images">
            <div id="slider-images" class="keen-slider wheel"></div>
        </div>
    </div>

    <!-- Abstract overlay (positioned over middle column) -->
    <div class="abstract" id="abstract">
        <div class="abstract-label">Abstract</div>
        <div class="abstract-text" id="abstract-text"></div>
    </div>

    <footer class="footer">
        <div class="footer-left">
            <a href="https://www.are.na/kirill-konstantinov-yx6dm9_zqzc/channels" target="_blank">Are.na</a>
            <a href="mailto:lux.exteriorrr@gmail.com">Contact</a>
        </div>
        <div class="footer-right" id="local-time"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/keen-slider@6.8.6/keen-slider.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
