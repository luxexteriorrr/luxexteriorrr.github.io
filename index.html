<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirill Konstantinov</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/keen-slider@6.8.6/keen-slider.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="index">
        <!-- Header bar -->
        <div class="line">
            <span class="label">Kirill Konstantinov</span>
            <span class="label center">Selected Works</span>
            <span class="label right">
                <a href="https://www.are.na/kirill-konstantinov-yx6dm9_zqzc/channels" target="_blank">Are.na</a>
                <a href="mailto:lux.exteriorrr@gmail.com">Contact</a>
            </span>
        </div>

        <!-- Main content area -->
        <div class="content">
            <!-- Left: Names wheel -->
            <div class="wheel-container names-container">
                <div id="wheel-names" class="wheel keen-slider"></div>
            </div>

            <!-- Center: Descriptions wheel -->
            <div class="wheel-container descriptions-container">
                <div id="wheel-descriptions" class="wheel keen-slider"></div>
            </div>

            <!-- Right: Images -->
            <div class="image-container">
                <div id="preview-image"></div>
            </div>
        </div>

        <!-- Abstract / info area -->
        <div class="abstract">
            <div class="abstract-label">About</div>
            <div class="abstract-text" id="abstract-text"></div>
        </div>

        <!-- Bottom bar -->
        <div class="line bottom">
            <span class="label" id="active-tags"></span>
            <span class="label center" id="active-year"></span>
            <span class="label right enter" id="enter-link">
                <a href="#" id="project-link">View Project ↗</a>
            </span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/keen-slider@6.8.6/keen-slider.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
